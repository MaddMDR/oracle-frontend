<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#131b2e"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <radialGradient id="irisGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="320" height="320" fill="url(#bgGlow)"/>

  <!-- Subtle iris glow -->
  <ellipse cx="160" cy="148" rx="72" ry="72" fill="url(#irisGlow)"/>

  <!-- ── CANDLESTICK LEFT ── -->
  <!-- body -->
  <rect x="46" y="124" width="14" height="48" rx="1.5" fill="#d4af37"/>
  <!-- top wick -->
  <line x1="53" y1="124" x2="53" y2="102" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>
  <!-- bottom wick -->
  <line x1="53" y1="172" x2="53" y2="194" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>

  <!-- ── CANDLESTICK RIGHT ── -->
  <rect x="260" y="124" width="14" height="48" rx="1.5" fill="#d4af37"/>
  <line x1="267" y1="124" x2="267" y2="102" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>
  <line x1="267" y1="172" x2="267" y2="194" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>

  <!-- ── EYE OUTLINE ── -->
  <!-- Upper lid -->
  <path d="M 60 148 Q 160 68 260 148" fill="none" stroke="#d4af37" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Lower lid -->
  <path d="M 60 148 Q 160 228 260 148" fill="none" stroke="#d4af37" stroke-width="2.8" stroke-linecap="round"/>

  <!-- ── IRIS RINGS ── -->
  <circle cx="160" cy="148" r="52" fill="none" stroke="#d4af37" stroke-width="1.2" opacity="0.45"/>
  <circle cx="160" cy="148" r="42" fill="none" stroke="#d4af37" stroke-width="0.9" opacity="0.32"/>
  <circle cx="160" cy="148" r="32" fill="none" stroke="#d4af37" stroke-width="0.7" opacity="0.22"/>

  <!-- ── CONSTELLATION DOTS ── -->
  <circle cx="148" cy="136" r="2" fill="#d4af37" opacity="0.6"/>
  <circle cx="172" cy="132" r="1.5" fill="#d4af37" opacity="0.5"/>
  <circle cx="178" cy="154" r="2" fill="#d4af37" opacity="0.55"/>
  <circle cx="152" cy="162" r="1.5" fill="#d4af37" opacity="0.5"/>
  <circle cx="140" cy="152" r="1.5" fill="#d4af37" opacity="0.45"/>
  <!-- Constellation lines -->
  <line x1="148" y1="136" x2="172" y2="132" stroke="#d4af37" stroke-width="0.7" opacity="0.3"/>
  <line x1="172" y1="132" x2="178" y2="154" stroke="#d4af37" stroke-width="0.7" opacity="0.3"/>
  <line x1="178" y1="154" x2="152" y2="162" stroke="#d4af37" stroke-width="0.7" opacity="0.3"/>
  <line x1="152" y1="162" x2="140" y2="152" stroke="#d4af37" stroke-width="0.7" opacity="0.3"/>
  <line x1="140" y1="152" x2="148" y2="136" stroke="#d4af37" stroke-width="0.7" opacity="0.3"/>

  <!-- ── DIAMOND PUPIL ── -->
  <polygon points="160,130 175,148 160,166 145,148" fill="#d4af37"/>

  <!-- ── WORDMARK ── -->
  <text
    x="160" y="242"
    font-family="'Cormorant Garamond', 'Georgia', serif"
    font-size="38"
    font-weight="600"
    letter-spacing="10"
    fill="#e8e4d8"
    text-anchor="middle"
  >ORACLE</text>

  <!-- Divider line -->
  <line x1="100" y1="254" x2="220" y2="254" stroke="#d4af37" stroke-width="0.8" opacity="0.4"/>

  <!-- ── ACRONYM SUBTITLE ── -->
  <text
    x="160" y="272"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="8.5"
    letter-spacing="2.5"
    fill="#d4af37"
    text-anchor="middle"
    opacity="0.7"
  >OPERATIONAL RECONNAISSANCE</text>
  <text
    x="160" y="285"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="8.5"
    letter-spacing="2.5"
    fill="#d4af37"
    text-anchor="middle"
    opacity="0.7"
  >ANALYTICAL CRYPTO LOGIC ENGINE</text>

  <!-- Corner star accent -->
  <g transform="translate(292, 292)" opacity="0.5">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#d4af37" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#d4af37" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-4" y1="-4" x2="4" y2="4" stroke="#d4af37" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="4" y1="-4" x2="-4" y2="4" stroke="#d4af37" stroke-width="0.7" stroke-linecap="round"/>
  </g>
</svg>
